<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPC-UA Server Connection Guide</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #f0f4f8;
  --surf:    #ffffff;
  --surf2:   #eef2f7;
  --bord:    #cfd9e6;
  --text:    #2d3f52;
  --muted:   #6b8096;
  --bright:  #1a2b3c;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 17px;
  line-height: 1.75;
  min-height: 100vh;
}
#prog { position:fixed;top:0;left:0;right:0;height:3px;background:var(--bord);z-index:200; }
#prog-fill { height:100%;background:linear-gradient(90deg,#ff6b35,#00a972,#0097e2,#ffb830);width:0;transition:width .2s; }
.wrap { max-width:900px;margin:0 auto;padding:56px 24px 100px; }
.hdr { text-align:center;margin-bottom:52px; }
.hdr h1 { font-family:'Cinzel',serif;font-size:clamp(22px,4.5vw,38px);font-weight:600;color:var(--bright);letter-spacing:.05em; }
.hdr p { color:var(--muted);font-style:italic;margin-top:10px;font-size:17px; }
.hdr-rule { width:60px;height:1px;background:var(--bord);margin:16px auto; }
.back-link { text-align:center;margin-bottom:24px; }
.back-link a { color:var(--muted);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em; }
.back-link a:hover { color:var(--bright); }
.layout { display:flex;gap:28px;align-items:flex-start; }
.tower { width:190px;flex-shrink:0;position:sticky;top:28px; }
.tower-label { font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.13em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;padding-left:4px; }
.tnav { display:flex;flex-direction:column;gap:1px; }
.ti {
  font-family:'JetBrains Mono',monospace;font-size:11px;
  padding:7px 10px;border-left:2px solid var(--bord);
  color:var(--muted);cursor:pointer;transition:all .2s;line-height:1.3;user-select:none;
}
.ti:hover { color:var(--bright);border-left-color:var(--muted); }
.ti.active { color:var(--bright); }
.cards { flex:1;min-width:0; }
.cw { margin-bottom:6px;opacity:0;transform:translateY(14px);transition:opacity .4s,transform .4s; }
.cw.show { opacity:1;transform:none; }
.conn { width:2px;height:18px;background:var(--bord);margin:0 0 0 20px; }
.card {
  border:1px solid var(--bord);border-radius:6px;background:var(--surf);
  overflow:hidden;cursor:pointer;transition:border-color .25s,box-shadow .25s;
  box-shadow:0 1px 4px rgba(0,0,0,0.07);
}
.card:hover { border-color:var(--ac); }
.card.open  { border-color:var(--ac);box-shadow:0 2px 20px -4px var(--ac-shadow); }
.card-head { display:flex;align-items:center;gap:12px;padding:15px 18px;user-select:none; }
.bdg {
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;
  border:1px solid var(--ac);color:var(--ac);padding:3px 7px;border-radius:2px;
  white-space:nowrap;flex-shrink:0;
}
.ctitle { font-family:'Cinzel',serif;font-size:15px;color:var(--bright);letter-spacing:.03em;flex:1; }
.chev { color:var(--muted);font-size:11px;transition:transform .3s;flex-shrink:0; }
.card.open .chev { transform:rotate(180deg); }
.card-body { max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1); }
.card-body.open { max-height:10000px; }
.card-inner { border-top:1px solid var(--bord);padding:20px 20px 26px; }
.prose { color:var(--text);font-size:16.5px;line-height:1.8;margin-top:12px; }
.prose em { font-style:italic;color:var(--bright); }
.prose strong { font-weight:600;color:var(--ac); }
.prose ul { margin-left:24px;margin-top:8px; }
.prose li { margin-top:6px; }
.bsec-heading {
  font-family:'Cinzel',serif;font-size:13px;letter-spacing:.04em;
  color:var(--ac);margin-top:22px;margin-bottom:2px;
  border-bottom:1px solid var(--bord);padding-bottom:6px;
}
.fbox {
  background:#f7f9fc;border-left:3px solid var(--ac);border-radius:0 4px 4px 0;
  padding:12px 15px;margin-top:10px;font-family:'JetBrains Mono',monospace;
  font-size:13px;color:var(--bright);line-height:1.8;white-space:pre-wrap;
}
.ex {
  background:#f7f9fc;border:1px dashed var(--bord);border-radius:4px;
  padding:11px 15px;margin-top:9px;font-size:15px;color:var(--text);line-height:1.7;
}
.footer { text-align:center;color:var(--muted);font-style:italic;font-size:15px;margin-top:52px;padding-top:26px;border-top:1px solid var(--bord); }

/* Tablet and below (iPad portrait: 768px) */
@media(max-width:1024px){
  .wrap { padding:40px 20px 80px; }
  .tower { width:160px; }
  .ti { font-size:10px;padding:6px 8px; }
}

/* Mobile and small tablets */
@media(max-width:768px){
  body { font-size:16px; }
  .wrap { padding:32px 16px 60px; }
  .hdr h1 { font-size:clamp(20px,6vw,32px); }
  .hdr p { font-size:15px; }
  .tower { display:none; }
  .layout { display:block; }
  .card-head { padding:12px 14px;gap:8px; }
  .bdg { font-size:8px;padding:2px 6px; }
  .ctitle { font-size:14px; }
  .card-inner { padding:16px 14px 20px; }
  .prose { font-size:15.5px;line-height:1.75; }
  .fbox { font-size:12px;padding:10px 12px; }
  .footer { font-size:13px;margin-top:40px; }
}

/* Very small phones */
@media(max-width:480px){
  body { font-size:15px; }
  .wrap { padding:24px 12px 50px; }
  .hdr { margin-bottom:36px; }
  .hdr h1 { font-size:24px; }
  .card-head { padding:10px 12px; }
  .card-inner { padding:12px; }
  .prose { font-size:15px; }
  .fbox { font-size:11px;padding:8px 10px; }
  .bsec-heading { font-size:12px;margin-top:18px; }
}
</style>
</head>
<body>
<div id="prog"><div id="prog-fill"></div></div>
<div class="wrap">
  <div class="back-link">
    <a href="../index.html">← BACK TO DOCUMENTATION HUB</a>
  </div>
  <div class="hdr">
    <h1>OPC-UA Server Connection Guide</h1>
    <div class="hdr-rule"></div>
    <p>Connect to the OT Simulator with 347 sensors across 15 industries</p>
  </div>
  <div class="layout">
    <div class="tower">
      <div class="tower-label">Sections</div>
      <div class="tnav" id="tnav"></div>
    </div>
    <div class="cards" id="cards"></div>
  </div>
  <div class="footer">
    Complete guide for connecting various OPC-UA clients to the OT Data Simulator<br>
    Supporting Ignition, UaExpert, Python, Node-RED, and more
  </div>
</div>
<script>
var SECTIONS = [
  {
    badge:"INFO", title:"Server Details", color:"#0097e2",
    body:`<div class="fbox">Endpoint URL: opc.tcp://localhost:4840/ot-simulator/server/
Security Policy: None (Anonymous)
Namespace URI: http://databricks.com/iot-simulator
Total Sensors: 347 sensors across 15 industries</div>`
  },
  {
    badge:"CLIENT", title:"Ignition SCADA", color:"#00a972",
    body:`<div class="bsec-heading">Connection Steps</div>
<div class="prose">
<ol>
<li>Navigate to <strong>Config → OPC UA → Connections</strong></li>
<li>Click <strong>Create new OPC UA Connection</strong></li>
<li>Fill in the details:<ul>
<li>Connection Name: <code>OT Simulator</code></li>
<li>Endpoint URL: <code>opc.tcp://localhost:4840/ot-simulator/server/</code></li>
<li>Security Policy: <code>None</code></li>
<li>Authentication: <code>Anonymous</code></li>
</ul></li>
<li>Click <strong>Create New Connection</strong></li>
<li><strong>Enable</strong> the connection</li>
<li>Browse tags in <strong>Tag Browser</strong> → expand the connection to see all 347 sensors</li>
</ol>
</div>
<div class="bsec-heading">Tag Structure</div>
<div class="fbox">OT Simulator/
├── IndustrialSensors/
    ├── mining/
    │   ├── conveyor_belt_1_speed
    │   ├── crusher_1_motor_power
    │   └── ...
    ├── utilities/
    ├── manufacturing/
    ├── oil_gas/
    ├── aerospace/
    └── ... (15 industries total)</div>`
  },
  {
    badge:"CLIENT", title:"Prosys OPC UA Browser", color:"#0097e2",
    body:`<div class="prose">
<ol>
<li>Open <strong>Prosys OPC UA Browser</strong></li>
<li>Click <strong>Connect</strong> (or the connection dropdown)</li>
<li><strong>Endpoint URL</strong>: <code>opc.tcp://localhost:4840/ot-simulator/server/</code></li>
<li><strong>Security Mode</strong>: <code>None</code></li>
<li><strong>User Authentication</strong>: <code>Anonymous</code></li>
<li>Click <strong>OK</strong> to connect</li>
<li>Browse the <strong>Address Space</strong> tree to see all sensors</li>
</ol>
</div>`
  },
  {
    badge:"CLIENT", title:"UaExpert Client", color:"#ffb830",
    body:`<div class="prose">
<ol>
<li>Open <strong>UaExpert</strong></li>
<li>Right-click <strong>Servers</strong> → <strong>Add</strong> → <strong>Add Server...</strong></li>
<li>In <strong>Custom Discovery</strong>: <code>opc.tcp://localhost:4840/ot-simulator/server/</code></li>
<li>Click <strong>Get Endpoints</strong></li>
<li>Select the endpoint with Security Policy: <code>None</code></li>
<li>Click <strong>OK</strong></li>
<li>Double-click the server to connect</li>
<li>Browse the <strong>Address Space</strong> pane to see all sensors</li>
</ol>
</div>`
  },
  {
    badge:"CODE", title:"Python (asyncua)", color:"#00a972",
    body:`<div class="fbox">import asyncio
from asyncua import Client

async def main():
    url = "opc.tcp://localhost:4840/ot-simulator/server/"

    async with Client(url=url) as client:
        print("Connected to OPC-UA server")

        # Get root node
        root = client.get_root_node()
        objects = await root.get_child(["0:Objects"])

        # Navigate to IndustrialSensors
        industrial_sensors = await objects.get_child(["2:IndustrialSensors"])

        # Get mining sensors
        mining = await industrial_sensors.get_child(["2:mining"])

        # Read a specific sensor
        crusher_power = await mining.get_child(["2:crusher_1_motor_power"])
        value = await crusher_power.read_value()
        print(f"Crusher Motor Power: {value} kW")

        # List all children
        children = await mining.get_children()
        for child in children:
            name = await child.read_browse_name()
            val = await child.read_value()
            print(f"{name.Name}: {val}")

asyncio.run(main())</div>`
  },
  {
    badge:"CLIENT", title:"Node-RED", color:"#ff6b35",
    body:`<div class="prose">
<ol>
<li>Install the <code>node-red-contrib-opcua</code> package</li>
<li>Drag an <strong>OPC UA-Client</strong> node to your flow</li>
<li>Configure the client:<ul>
<li>Endpoint: <code>opc.tcp://localhost:4840/ot-simulator/server/</code></li>
<li>Security Policy: <code>None</code></li>
<li>Security Mode: <code>None</code></li>
</ul></li>
<li>Use <strong>OPC UA-Read</strong> nodes to read sensor values</li>
<li><strong>Node ID</strong> format: <code>ns=2;s=mining/crusher_1_motor_power</code></li>
</ol>
</div>`
  },
  {
    badge:"DATA", title:"Available Industries", color:"#0097e2",
    body:`<div class="prose">
<ol>
<li><strong>mining</strong> - 24 sensors (conveyors, crushers, pumps, drills, trucks)</li>
<li><strong>utilities</strong> - 18 sensors (generators, transformers, substations)</li>
<li><strong>manufacturing</strong> - 21 sensors (assembly lines, robots, CNCs, presses)</li>
<li><strong>oil_gas</strong> - 15 sensors (pipelines, wells, compressors, tanks)</li>
<li><strong>aerospace</strong> - 23 sensors (wind tunnels, autoclaves, test stands)</li>
<li><strong>space</strong> - 29 sensors (vacuum chambers, thrusters, solar panels)</li>
<li><strong>water_wastewater</strong> - 28 sensors (influent/effluent, clarifiers, aeration)</li>
<li><strong>electric_power</strong> - 24 sensors (turbines, generators, switchgear)</li>
<li><strong>automotive</strong> - 24 sensors (paint booths, welding, stamping, AGVs)</li>
<li><strong>chemical</strong> - 27 sensors (reactors, distillation, crystallizers)</li>
<li><strong>food_beverage</strong> - 27 sensors (fermentation, pasteurization, bottling)</li>
<li><strong>pharmaceutical</strong> - 30 sensors (bioreactors, autoclaves, lyophilizers)</li>
<li><strong>data_center</strong> - 24 sensors (servers, cooling, UPS, generators)</li>
<li><strong>smart_building</strong> - 24 sensors (HVAC, lighting, elevators)</li>
<li><strong>agriculture</strong> - 29 sensors (irrigation, greenhouses, grain storage)</li>
</ol>
</div>`
  },
  {
    badge:"TROUBLESHOOT", title:"Common Issues", color:"#ff3621",
    body:`<div class="bsec-heading">Connection Refused</div>
<div class="prose">
<ul>
<li>Ensure the simulator is running: <code>python -m ot_simulator --protocol opcua --web-ui</code></li>
<li>Check the simulator logs: <code>tail -f ot_simulator.log</code></li>
<li>Verify port 4840 is not blocked by firewall</li>
</ul>
</div>
<div class="bsec-heading">No Data Visible</div>
<div class="prose">
<ul>
<li>The simulator needs to be <strong>started</strong> (either via Web UI or NLP command)</li>
<li>Use NLP command: "start opcua"</li>
<li>Or click the <strong>Start</strong> button next to OPC-UA in the Web UI</li>
<li>Check Web UI at http://localhost:8989 to verify status</li>
</ul>
</div>
<div class="bsec-heading">Python 3.14 Compatibility Issues</div>
<div class="ex"><strong>Symptom:</strong> "Bad_Timeout" or "TypeError: issubclass() arg 1 must be a class" errors<br><br>
<strong>Root Cause:</strong> Python 3.14 has compatibility issues with asyncua library<br><br>
<strong>Solution:</strong> Downgrade to Python 3.11 or 3.12</div>
<div class="fbox"># Using pyenv (recommended)
pyenv install 3.12.0
pyenv local 3.12.0

# Recreate virtual environment
rm -rf venv
python -m venv venv
source venv/bin/activate
pip install -r requirements.txt

# Restart simulator
python -m ot_simulator --protocol opcua --web-ui</div>`
  }
];

function rgba(hex, a) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return "rgba("+r+","+g+","+b+","+a+")";
}
function init() {
  var tnav = document.getElementById("tnav");
  var cards = document.getElementById("cards");
  SECTIONS.forEach(function(sec, i) {
    var ti = document.createElement("div");
    ti.className = "ti"; ti.textContent = sec.title; ti.dataset.i = i;
    ti.addEventListener("click", function() {
      var cw = document.querySelector(".cw[data-i='"+i+"']");
      if (cw) { cw.scrollIntoView({behavior:"smooth",block:"center"}); setTimeout(function(){ openCard(i); },350); }
    });
    tnav.appendChild(ti);
    var cw = document.createElement("div");
    cw.className = "cw"; cw.dataset.i = i;
    cw.innerHTML =
      (i > 0 ? '<div class="conn"></div>' : '') +
      '<div class="card" style="--ac:'+sec.color+';--ac-faint:'+rgba(sec.color,.08)+';--ac-mid:'+rgba(sec.color,.22)+';--ac-shadow:'+rgba(sec.color,.35)+'">' +
        '<div class="card-head">' +
          '<span class="bdg">'+sec.badge+'</span>' +
          '<span class="ctitle">'+sec.title+'</span>' +
          '<span class="chev">&#9660;</span>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="card-inner">' + sec.body + '</div>' +
        '</div>' +
      '</div>';
    cards.appendChild(cw);
    var card = cw.querySelector(".card"), body = cw.querySelector(".card-body");
    card.addEventListener("click", function() {
      var open = card.classList.contains("open");
      card.classList.toggle("open", !open); body.classList.toggle("open", !open);
      document.querySelectorAll(".ti").forEach(function(t,j){ t.classList.toggle("active",!open && j===i); });
      if (!open) { ti.style.borderLeftColor = sec.color; ti.style.color = sec.color; }
      else { ti.style.borderLeftColor = ""; ti.style.color = ""; }
    });
  });
  var fill = document.getElementById("prog-fill");
  window.addEventListener("scroll", function(){
    var pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
    fill.style.width = Math.min(pct,100)+"%";
  });
  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting) e.target.classList.add("show"); });
  },{threshold:0.05});
  document.querySelectorAll(".cw").forEach(function(el){ obs.observe(el); });
  setTimeout(function(){ openCard(0); }, 150);
}
function openCard(i) {
  var cw = document.querySelector(".cw[data-i='"+i+"']");
  if (!cw) return;
  var card = cw.querySelector(".card"), body = cw.querySelector(".card-body");
  if (!card.classList.contains("open")) {
    card.classList.add("open"); body.classList.add("open");
    var ti = document.querySelector(".ti[data-i='"+i+"']");
    if (ti) { ti.style.borderLeftColor = SECTIONS[i].color; ti.style.color = SECTIONS[i].color; }
    document.querySelectorAll(".ti").forEach(function(t,j){ t.classList.toggle("active",j===i); });
  }
}
init();
</script>
</body>
</html>
