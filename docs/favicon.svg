<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0097e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2b3c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a2b3c"/>

  <!-- Gear teeth (8 teeth) -->
  <path d="M32,4 L35,12 L29,12 Z" fill="url(#gearGrad)"/>
  <path d="M52.87,14.13 L49.87,20.93 L45.07,17.93 Z" fill="url(#gearGrad)"/>
  <path d="M60,32 L52,35 L52,29 Z" fill="url(#gearGrad)"/>
  <path d="M52.87,49.87 L45.07,46.07 L49.87,43.07 Z" fill="url(#gearGrad)"/>
  <path d="M32,60 L29,52 L35,52 Z" fill="url(#gearGrad)"/>
  <path d="M11.13,49.87 L14.13,43.07 L18.93,46.07 Z" fill="url(#gearGrad)"/>
  <path d="M4,32 L12,29 L12,35 Z" fill="url(#gearGrad)"/>
  <path d="M11.13,14.13 L18.93,17.93 L14.13,20.93 Z" fill="url(#gearGrad)"/>

  <!-- Main gear body -->
  <circle cx="32" cy="32" r="16" fill="url(#gearGrad)"/>

  <!-- Center hole -->
  <circle cx="32" cy="32" r="6" fill="#1a2b3c"/>

  <!-- Center highlight -->
  <circle cx="32" cy="32" r="3" fill="#0097e2" opacity="0.6"/>

  <!-- Subtle circuit pattern overlay -->
  <path d="M20,26 L20,20 L26,20 M38,20 L44,20 L44,26 M44,38 L44,44 L38,44 M26,44 L20,44 L20,38"
        stroke="#00a972" stroke-width="0.8" fill="none" opacity="0.4"/>
</svg>
